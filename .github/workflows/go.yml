name: Go

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"
          cache: true

      - name: Go tests (warp-plus)
        working-directory: warp-plus
        run: go test ./...

      - name: Go tests (tun2socks)
        working-directory: tun2socks
        run: go test ./...

      - name: Install govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: govulncheck (warp-plus)
        working-directory: warp-plus
        run: govulncheck ./...

      - name: govulncheck (tun2socks)
        working-directory: tun2socks
        run: govulncheck ./...
