name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.4"
          cache: false

      - name: Install Gitleaks
        run: |
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Validate workflows and security scripts
        run: |
          actionlint
          bash -n scripts/run_mobsf_scan.sh
          python3 -m unittest scripts.test_verify_licenses

      - name: Scan repository and history
        run: |
          mkdir -p build/reports/security
          gitleaks git \
            --no-banner \
            --redact=100 \
            --report-format sarif \
            --report-path build/reports/security/gitleaks.sarif \
            .

      - name: Upload secret-scan report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gitleaks-report
          path: build/reports/security/gitleaks.sarif
          if-no-files-found: error

  licenses:
    name: License inventory
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: "26"

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: |
            tun2socks/go.mod
            tun2socks/go.sum

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Prepare controlled forks
        shell: pwsh
        run: |
          ./native/usque/prepare-usque.ps1 `
            -WorkDir "$env:GITHUB_WORKSPACE/build/native/usque"
          ./native/warp-plus/prepare-warp-plus.ps1 `
            -WorkDir "$env:GITHUB_WORKSPACE/build/native/warp-plus"

      - name: Generate Android dependency inventory
        run: |
          ./gradlew \
            :app:cyclonedxDirectBom \
            --warning-mode all \
            --no-daemon

      - name: Generate Go license inventory
        working-directory: tun2socks
        run: |
          go install github.com/google/go-licenses/v2@v2.0.1
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.10.0
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.4.0
          mkdir -p ../build/reports/licenses
          mkdir -p ../build/reports/sbom
          mkdir -p ../build/reports/security
          go-licenses report ./... > ../build/reports/licenses/go-licenses.csv
          cyclonedx-gomod mod \
            -json \
            -type library \
            -output ../build/reports/sbom/native-bom.cdx.json \
            .

      - name: Scan Android and native dependency inventories
        run: |
          osv-scanner scan source \
            --format=json \
            --output-file=build/reports/security/osv-android.json \
            app/build/reports/cyclonedx-direct/bom.json
          osv-scanner scan source \
            --format=json \
            --output-file=build/reports/security/osv-native.json \
            build/reports/sbom/native-bom.cdx.json

      - name: Verify identified licenses
        run: |
          python3 -m unittest scripts.test_verify_licenses
          python3 scripts/verify_licenses.py \
            --android-bom app/build/reports/cyclonedx-direct/bom.json \
            --go-report build/reports/licenses/go-licenses.csv \
            --upstreams native/core-upstreams.json \
            --output build/reports/licenses/license-gate.json

      - name: Upload license evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: license-inventory
          path: |
            app/build/reports/cyclonedx-direct/bom.json
            build/reports/sbom/native-bom.cdx.json
            build/reports/licenses/go-licenses.csv
            build/reports/licenses/license-gate.json
            build/reports/security/osv-android.json
            build/reports/security/osv-native.json
          if-no-files-found: error

  mobsf:
    name: MobSF release APK
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: "26"

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: |
            tun2socks/go.mod
            tun2socks/go.sum

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install native build tools
        run: |
          sdkmanager "platforms;android-37" "ndk;30.0.14904198"
          go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20260611195102-4dd8f1dbf5d2

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Build unsigned universal OSS APK
        run: |
          ./gradlew \
            :app:assembleOssRelease \
            --warning-mode all \
            --no-daemon

      - name: Run pinned MobSF
        run: |
          scripts/run_mobsf_scan.sh \
            app/build/outputs/apk/oss/release/Oblivion-ossRelease-universal.apk \
            build/reports/security/mobsf

      - name: Upload MobSF evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mobsf-report
          path: build/reports/security/mobsf
          if-no-files-found: error
