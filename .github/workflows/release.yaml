name: Release candidate

on:
  workflow_dispatch:
  release:
    types: ["created"]

jobs:
  build:
    name: Build & Release
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    runs-on: ubuntu-latest

    env:
      CGO_ENABLED: 1

    steps:
      - name: Checkout codebase
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.4"
          cache: true

      - name: Setup JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: "26"
          distribution: "temurin"
          cache: "gradle"

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install native build tools
        run: sdkmanager "platforms;android-37" "build-tools;37.0.0" "ndk;30.0.14904198"

      - name: Grant Execute Permission to Gradlew
        run: chmod +x ./gradlew

      - name: Install gomobile
        run: go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20260611195102-4dd8f1dbf5d2

      - name: Install native SBOM generator
        run: |
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.10.0
          go install github.com/google/go-licenses/v2@v2.0.1
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.4.0
          go install github.com/zricethezav/gitleaks/v8@v8.30.1

      - name: Secret scan
        run: |
          mkdir -p build/reports/security
          gitleaks git \
            --no-banner \
            --redact=100 \
            --report-format sarif \
            --report-path build/reports/security/gitleaks.sarif \
            .

      - name: Configure release signing
        if: github.event_name == 'release'
        env:
          OSS_ANDROID_KEYSTORE_BASE64: ${{ secrets.OSS_ANDROID_KEYSTORE_BASE64 }}
          PLAY_ANDROID_KEYSTORE_BASE64: ${{ secrets.PLAY_ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          : "${OSS_ANDROID_KEYSTORE_BASE64:?OSS Android keystore is required}"
          : "${PLAY_ANDROID_KEYSTORE_BASE64:?Play upload keystore is required}"
          printf '%s' "$OSS_ANDROID_KEYSTORE_BASE64" | base64 --decode > oss-release-keystore.jks
          printf '%s' "$PLAY_ANDROID_KEYSTORE_BASE64" | base64 --decode > play-upload-keystore.jks

      - name: Build OSS release candidate
        env:
          OSS_ANDROID_KEYSTORE_FILE: ${{ github.event_name == 'release' && 'oss-release-keystore.jks' || '' }}
          OSS_ANDROID_KEYSTORE_PASSWORD: ${{ github.event_name == 'release' && secrets.OSS_ANDROID_KEYSTORE_PASSWORD || '' }}
          OSS_ANDROID_KEY_ALIAS: ${{ github.event_name == 'release' && secrets.OSS_ANDROID_KEY_ALIAS || '' }}
          OSS_ANDROID_KEY_PASSWORD: ${{ github.event_name == 'release' && secrets.OSS_ANDROID_KEY_PASSWORD || '' }}
        run: |
          ./gradlew \
            spotlessCheck \
            :app:detekt \
            :app:testOssDebugUnitTest \
            :app:assembleOssRelease \
            :app:lintOssRelease \
            -Poblivion.abiSplits=true \
            --warning-mode all \
            --no-daemon

      - name: Build Play release candidate and Android SBOM
        env:
          PLAY_ANDROID_KEYSTORE_FILE: ${{ github.event_name == 'release' && secrets.PLAY_ANDROID_KEYSTORE_BASE64 != '' && 'play-upload-keystore.jks' || '' }}
          PLAY_ANDROID_KEYSTORE_PASSWORD: ${{ github.event_name == 'release' && secrets.PLAY_ANDROID_KEYSTORE_PASSWORD || '' }}
          PLAY_ANDROID_KEY_ALIAS: ${{ github.event_name == 'release' && secrets.PLAY_ANDROID_KEY_ALIAS || '' }}
          PLAY_ANDROID_KEY_PASSWORD: ${{ github.event_name == 'release' && secrets.PLAY_ANDROID_KEY_PASSWORD || '' }}
        run: |
          ./gradlew \
            spotlessCheck \
            :app:testPlayDebugUnitTest \
            :app:bundlePlayRelease \
            :app:lintPlayRelease \
            :app:cyclonedxDirectBom \
            --warning-mode all \
            --no-daemon

      - name: Generate native SBOM
        working-directory: tun2socks
        run: |
          mkdir -p ../build/reports/sbom
          cyclonedx-gomod mod \
            -json \
            -type library \
            -output ../build/reports/sbom/native-bom.cdx.json \
            .

      - name: Generate and verify license inventory
        run: |
          mkdir -p build/reports/licenses
          (cd tun2socks && go-licenses report ./...) \
            > build/reports/licenses/go-licenses.csv
          python3 -m unittest scripts.test_verify_licenses
          python3 scripts/verify_licenses.py \
            --android-bom app/build/reports/cyclonedx-direct/bom.json \
            --go-report build/reports/licenses/go-licenses.csv \
            --upstreams native/core-upstreams.json \
            --output build/reports/licenses/license-gate.json

      - name: Scan Android and native dependencies
        run: |
          osv-scanner scan source \
            --format=json \
            --output-file=build/reports/security/osv-android.json \
            app/build/reports/cyclonedx-direct/bom.json
          osv-scanner scan source \
            --format=json \
            --output-file=build/reports/security/osv-native.json \
            build/reports/sbom/native-bom.cdx.json

      - name: MobSF release gate
        run: |
          bash scripts/run_mobsf_scan.sh \
            app/build/outputs/apk/oss/release/Oblivion-ossRelease-universal.apk \
            build/reports/security/mobsf

      - name: Verify release signature
        if: github.event_name == 'release'
        run: |
          set -euo pipefail
          for apk in app/build/outputs/apk/oss/release/*.apk; do
            "$ANDROID_HOME/build-tools/37.0.0/apksigner" verify \
              --verbose \
              --print-certs \
              "$apk"
          done
          for bundle in app/build/outputs/bundle/playRelease/*.aab; do
            jarsigner -verify -strict -certs "$bundle"
          done

      - name: Checksums
        run: |
          sha256sum \
            app/libs/tun2socks.aar \
            app/build/outputs/apk/oss/release/*.apk \
            app/build/outputs/bundle/playRelease/*.aab \
            app/build/reports/cyclonedx-direct/bom.json \
            app/build/reports/cyclonedx-direct/bom.xml \
            build/reports/sbom/native-bom.cdx.json \
            build/reports/licenses/go-licenses.csv \
            build/reports/licenses/license-gate.json \
            build/reports/security/gitleaks.sarif \
            build/reports/security/osv-android.json \
            build/reports/security/osv-native.json \
            build/reports/security/mobsf/gate.json \
            build/reports/security/mobsf/report.json \
            build/reports/security/mobsf/scorecard.json \
            > SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: |
            app/libs/tun2socks.aar
            app/build/outputs/apk/oss/release/*.apk
            app/build/outputs/bundle/playRelease/*.aab

      - name: Attest Android SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: |
            app/build/outputs/apk/oss/release/*.apk
            app/build/outputs/bundle/playRelease/*.aab
          sbom-path: app/build/reports/cyclonedx-direct/bom.json

      - name: Attest native SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: app/libs/tun2socks.aar
          sbom-path: build/reports/sbom/native-bom.cdx.json

      - name: Upload Tun2Socks AAR
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tun2socks-aar
          path: app/libs/tun2socks.aar
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: oblivion-release-${{ github.event_name == 'release' && 'signed' || 'unsigned' }}
          path: app/build/outputs/apk/oss/release/*.apk
          if-no-files-found: error

      - name: Upload Play AAB
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: oblivion-play-aab-candidate
          path: app/build/outputs/bundle/playRelease/*.aab
          if-no-files-found: error

      - name: Upload checksums
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: checksums
          path: SHA256SUMS

      - name: Upload SBOMs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cyclonedx-sboms
          path: |
            app/build/reports/cyclonedx-direct/bom.json
            app/build/reports/cyclonedx-direct/bom.xml
            build/reports/sbom/native-bom.cdx.json
          if-no-files-found: error

      - name: Upload security and license evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-security-evidence
          path: |
            build/reports/licenses
            build/reports/security
          if-no-files-found: error

      - name: Remove signing material
        if: always() && github.event_name == 'release'
        run: rm -f oss-release-keystore.jks play-upload-keystore.jks
